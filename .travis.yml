language: node_js
node_js:
  - lts/*
# install:
#   - yarn install # npm ci
script: deploy.sh
deploy:
  provider: script
  script: bash deploy.sh
  provider: pages
  skip_cleanup: true
  local_dir: docs/.vuepress/dist
  github_token: 70e050fc078b0770c3437280910ce41c1ce348fb # 在 GitHub 中生成，用于允许 Travis 向你的仓库推送代码。在 Travis 的项目设置页面进行配置，设置为 secure variable
  keep_history: true
  on:
    branch: master